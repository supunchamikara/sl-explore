{% extends "base.html" %}

{% block title %}Register — SL·Explore{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-card">

    <div class="text-center mb-4">
      <div style="font-size:2.4rem; color:var(--blue);"><i class="bi bi-person-plus-fill"></i></div>
      <h2>Create an account</h2>
      <p class="text-muted" style="font-size:.9rem;">Join the community and start adding attractions</p>
    </div>

    {% if error %}
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span>{{ error }}</span>
      </div>
    {% endif %}

    <form method="post" action="/register" novalidate>

      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="you@example.com" required autofocus />
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               placeholder="Choose a strong password" required minlength="6" />
        <div class="form-text">At least 6 characters recommended.</div>
      </div>

      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-person-check me-1"></i>Create Account
      </button>

    </form>

    <hr class="my-4" />

    <p class="text-center text-muted mb-0" style="font-size:.88rem;">
      Already have an account?
      <a href="/login" style="color:var(--blue); font-weight:600;">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
